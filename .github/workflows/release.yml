name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            args: ''
            rust_target: ''
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Teleprompter ${{ github.ref_name }}
          releaseBody: |
            ## Teleprompter ${{ github.ref_name }}

            | Platform | File |
            |---|---|
            | macOS Apple Silicon | Teleprompter_*_aarch64.dmg |
            | macOS Intel | Teleprompter_*_x64.dmg |
            | Windows | Teleprompter_*_x64-setup.exe |

            **macOS:** Ad-hoc signed — no Gatekeeper warning.
            **Windows:** Click More info → Run anyway.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # ── Ad-hoc sign the .app after build (macOS only) ──────────────────────
      # Ad-hoc signing uses "-" as the identity — no Apple Developer account needed.
      # This removes the "damaged and can't be opened" error completely.
      # Users may still see "unidentified developer" on first launch but NOT "damaged".
      - name: Ad-hoc sign the app (macOS)
        if: runner.os == 'macOS'
        run: |
          # Find the built .app bundle
          APP=$(find src-tauri/target -name "*.app" -not -path "*/build/*" | head -1)
          if [ -n "$APP" ]; then
            echo "Signing: $APP"
            # Remove existing quarantine attributes
            xattr -cr "$APP"
            # Ad-hoc sign with hardened runtime
            codesign --force --deep --sign "-" \
              --options runtime \
              --entitlements src-tauri/entitlements.plist \
              "$APP"
            echo "Signed successfully"
            codesign --verify --verbose "$APP"
          else
            echo "No .app found, skipping"
          fi

      # Re-package the DMG after signing so the signed .app is inside
      - name: Repackage DMG with signed app (macOS)
        if: runner.os == 'macOS'
        run: |
          DMG=$(find src-tauri/target -name "*.dmg" | head -1)
          APP=$(find src-tauri/target -name "*.app" -not -path "*/build/*" | head -1)
          if [ -n "$DMG" ] && [ -n "$APP" ]; then
            echo "Repacking $DMG with signed $APP"
            DMG_DIR=$(dirname "$DMG")
            DMG_NAME=$(basename "$DMG")
            MOUNT_POINT="/tmp/dmg_mount_$$"

            # Mount original DMG
            hdiutil attach "$DMG" -mountpoint "$MOUNT_POINT" -nobrowse -quiet

            # Create new DMG from the signed .app
            hdiutil create \
              -volname "Teleprompter" \
              -srcfolder "$MOUNT_POINT" \
              -ov -format UDZO \
              "/tmp/${DMG_NAME}"

            hdiutil detach "$MOUNT_POINT" -quiet

            # Replace original
            cp "/tmp/${DMG_NAME}" "$DMG"
            echo "DMG repacked: $DMG"
          fi